    <h2>Books</h2>

    <div class="search">
      <div class="author">
        <label for="name">Search book by author: </label><br />
        <input type="text" id="author" />
        <button type="button" onclick="searchBooks('author')">Search</button>
      </div>
      <div class="title">
        <label for="name">Search book by title: </label><br />
        <input type="text" id="title" />
        <button type="button" onclick="searchBooks('title')">Search</button>
      </div>
    </div>

    <button type="button" id="available" onclick="availableBooks(true)">
      List Available
    </button>
    <button type="button" id="unavailable" onclick="availableBooks(false)">
      List Unavailable
    </button><br>
    <button type="button" id="totalPrice" onclick="totalValueOfBooks()">Calculate Value</button>
    <p id="totalValue"></p>
    <button type="button" id="mostExpensive" onclick="expensiveBook()">Most Expensive Book</button>
    <p id="expensive"></p>
    <ul id="list-books"></ul>
